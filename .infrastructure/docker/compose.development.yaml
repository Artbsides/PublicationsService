services:
    api: &api
        image: xml-parser-api:development
        container_name: api
        command: ${COMPOSE_DEVELOPMENT_COMMAND:-}
        build:
            target: development
        environment:
            APP_DEBUG: 1
            APP_ENVIRONMENT: development
            PYDEVD_DISABLE_FILE_VALIDATION: true
        volumes:
            - ./:/app
        ports:
            - ${APP_PORT:-8000}:8000
            - ${APP_DEBUG_PORT:-5678}:5678

    shell:
        <<: *api
        command: /bin/ash
