name: xml-parser

services:
    api: &api
        image: xml-parser-api:latest
        container_name: api
        tty: true
        build:
            context: .
            dockerfile: .infrastructure/docker/Dockerfile
        env_file:
            - .env
        environment:
            APP_DEBUG: 0
            APP_ENVIRONMENT: production
        depends_on:
            - postgres
            - rabbitmq
            - minio
            - minio-buckets
        ports:
            - ${APP_PORT:-8000}:8000

    postgres:
        image: postgres:18.3-alpine
        container_name: postgres
        environment:
            POSTGRES_USER: ${DATABASE_USER}
            POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
            POSTGRES_DB: ${DATABASE_NAME}
        volumes:
            - ./volumes/postgres:/var/lib/postgresql
        ports:
            - ${DATABASE_PORT:-5432}:5432

    rabbitmq:
        image: rabbitmq:4.2.4-management-alpine
        container_name: rabbitmq
        environment:
            RABBITMQ_DEFAULT_USER: ${MESSAGE_BROKER_USER}
            RABBITMQ_DEFAULT_PASS: ${MESSAGE_BROKER_PASS}
        volumes:
            - ./volumes/rabbitmq:/var/lib/rabbitmq
        ports:
            - ${MESSAGE_BROKER_PORT:-5672}:5672
            - ${MESSAGE_BROKER_MANAGEMENT_PORT:-15672}:15672

    minio:
        image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
        container_name: minio
        command: server /data --console-address ":9001"
        environment:
            MINIO_ROOT_USER: ${BUCKET_USER}
            MINIO_ROOT_PASSWORD: ${BUCKET_PASSWORD}
        volumes:
            - ./volumes/minio:/data
        ports:
            - ${BUCKET_PORT:-9000}:9000
            - ${BUCKET_MANAGEMENT_PORT:-9001}:9001

    minio-buckets:
        image: minio/mc:latest
        restart: "no"
        depends_on:
            - minio
        entrypoint: >
            /bin/sh -c "
            until mc alias set local http://minio:9000 ${BUCKET_USER} ${BUCKET_PASSWORD}; do sleep 2; done;
            mc mb --ignore-existing local/${BUCKET_NAME};
            "

    prometheus:
        image: prom/prometheus:v2.52.0
        container_name: prometheus
        volumes:
            - ./.infrastructure/monitoring/prometheus/:/etc/prometheus/
        depends_on:
            - api
        ports:
            - ${PROMETHEUS_PORT:-3000}:9090

    grafana:
        image: grafana/grafana:11.0.0
        container_name: grafana
        environment:
            GF_AUTH_ANONYMOUS_ENABLED: 1
            GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
        volumes:
            - ./.infrastructure/monitoring/grafana/prometheus-datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml
            - ./.infrastructure/monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
        depends_on:
            - prometheus
        ports:
            - ${GRAFANA_PORT:-3001}:3000

    runner:
        <<: *api
        command: /bin/ash
