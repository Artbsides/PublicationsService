name: publications-service

services:
    base: &base
        tty: true
        image: publications-service-api:latest
        env_file:
            - ../../.env
        environment:
            APP_DEBUG: 0
            APP_ENVIRONMENT: production
            DATABASE_HOST: postgres
            MESSAGE_BROKER_HOST: rabbitmq
            STORAGE_HOST: http://minio:9000
        depends_on:
            - postgres
            - rabbitmq
            - minio-buckets
        ports:
            - ${APP_PORT:-8000}:8000

    api: &api
        <<: *base
        container_name: api
        build:
            context: ../..
            dockerfile: .infrastructure/docker/Dockerfile

    shell:
        <<: *api
        command: /bin/ash

    worker:
        <<: *base
        container_name: worker
        command: celery -A workers.create_publication.app worker --loglevel=info --concurrency=2
        ports: []

    postgres:
        image: postgres:18.3-alpine
        container_name: postgres
        environment:
            POSTGRES_USER: ${DATABASE_USER}
            POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
            POSTGRES_DB: ${DATABASE_NAME}
        volumes:
            - ./volumes/postgres:/var/lib/postgresql
        ports:
            - ${DATABASE_PORT:-5432}:5432

    rabbitmq:
        image: rabbitmq:4.2.4-management-alpine
        container_name: rabbitmq
        environment:
            RABBITMQ_DEFAULT_USER: ${MESSAGE_BROKER_USER}
            RABBITMQ_DEFAULT_PASS: ${MESSAGE_BROKER_PASSWORD}
        volumes:
            - ./volumes/rabbitmq:/var/lib/rabbitmq
        ports:
            - ${MESSAGE_BROKER_PORT:-5672}:5672
            - ${MESSAGE_BROKER_MANAGEMENT_PORT:-15672}:15672

    minio:
        image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
        container_name: minio
        command: server /data --console-address ":9001"
        environment:
            MINIO_ROOT_USER: ${STORAGE_USER}
            MINIO_ROOT_PASSWORD: ${STORAGE_PASSWORD}
        volumes:
            - ./volumes/minio:/data
        ports:
            - ${STORAGE_PORT:-9000}:9000
            - ${STORAGE_MANAGEMENT_PORT:-9001}:9001

    minio-buckets:
        image: minio/mc:latest
        depends_on:
            - minio
        entrypoint:
            - /bin/sh
            - -c
            - |
                until mc alias set local http://minio:9000 ${STORAGE_USER} ${STORAGE_PASSWORD}; do
                    sleep 2
                done

                mc mb --ignore-existing local/${STORAGE_NAME}

    prometheus:
        image: prom/prometheus:v2.52.0
        container_name: prometheus
        volumes:
            - ./../monitoring/prometheus/:/etc/prometheus/
        ports:
            - ${PROMETHEUS_PORT:-3000}:9090

    grafana:
        image: grafana/grafana:11.0.0
        container_name: grafana
        environment:
            GF_AUTH_ANONYMOUS_ENABLED: 1
            GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
        volumes:
            - ./../monitoring/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasource.yml
            - ./../monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
        depends_on:
            - prometheus
        ports:
            - ${GRAFANA_PORT:-3001}:3000

    loki:
        image: grafana/loki:3.6.6
        container_name: loki
        ports:
            - ${LOKI_PORT:-3100}:3100

    tempo:
        image: grafana/tempo:2.9.0
        container_name: tempo
        command: -config.file=/etc/tempo/tempo.yml
        volumes:
            - ./../monitoring/tempo.yml:/etc/tempo/tempo.yml
        ports:
            - ${TEMPO_PORT:-3200}:3200
            - ${TEMPO_RECEIVER_GRPC_PORT:-4317}:4317
            - ${TEMPO_RECEIVER_HTTP_PORT:-4318}:4318

    alloy:
        image: grafana/alloy:v1.13.1
        container_name: alloy
        command: run --server.http.listen-addr=0.0.0.0:12345 /etc/alloy/config.alloy
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock
            - ./../monitoring/collector.alloy:/etc/alloy/config.alloy
        depends_on:
            - loki
            - tempo
        ports:
            - ${ALLOY_PORT:-12345}:12345

