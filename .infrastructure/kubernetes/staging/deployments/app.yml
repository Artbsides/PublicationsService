kind: Deployment
apiVersion: apps/v1
metadata:
    name: publications-service-deployment
    namespace: staging-apps
spec:
    replicas: 1
    selector:
        matchLabels:
            app: publications-service
    template:
        metadata:
            labels:
                app: publications-service
        spec:
            containers:
              - name: publications-service
                image: docker.io/rempeloliveira/public:publications-service.0.0.2-staging
                imagePullPolicy: Always
                ports:
                  - containerPort: 8000
                envFrom:
                  - secretRef:
                        name: publications-service-secrets
                resources:
                    requests:
                        cpu: 250m
                        memory: 512Mi
                    limits:
                        cpu: 500m
                        memory: 1Gi
