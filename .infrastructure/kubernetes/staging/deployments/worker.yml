kind: Deployment
apiVersion: apps/v1
metadata:
    name: publications-service-worker-deployment
    namespace: staging-apps
spec:
    replicas: 1
    selector:
        matchLabels:
            app: publications-service-worker
    template:
        metadata:
            labels:
                app: publications-service-worker
        spec:
            containers:
              - name: publications-service-worker
                image: docker.io/rempeloliveira/public:publications-service.0.0.2-staging
                imagePullPolicy: Always
                command: ["celery", "-A", "workers.create_publication.app", "worker", "--loglevel=info", "--concurrency=2"]
                envFrom:
                  - secretRef:
                        name: publications-service-secrets
                resources:
                    requests:
                        cpu: 250m
                        memory: 512Mi
                    limits:
                        cpu: 500m
                        memory: 1Gi
