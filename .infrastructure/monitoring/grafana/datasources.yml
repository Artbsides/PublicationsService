apiVersion: 1

deleteDatasources:
  - name: Prometheus
  - name: Loki
  - name: Tempo

datasources:
  - name: Prometheus
    type: prometheus
    url: http://prometheus:9090
    editable: false

  - name: Loki
    type: loki
    url: http://loki:3100
    editable: false
    jsonData:
        derivedFields:
            - matcherRegex: "trace_id=(\\w+)"
              name: TraceID
              url: "$${__value.raw}"
              datasourceUid: tempo

  - name: Tempo
    type: tempo
    url: http://tempo:3200
    editable: false
    jsonData:
        lokiSearch:
            datasourceUid: loki
        tracesToLogs:
            datasourceUid: loki
